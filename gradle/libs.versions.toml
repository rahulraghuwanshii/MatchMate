[versions]
agp = "8.11.2"
flexbox = "3.0.0"
hiltAndroid = "2.57.1"
hiltAndroidCompiler = "2.57.1"
hiltNavigationFragment = "1.0.0"
kotlin = "2.2.0"
coreKtx = "1.18.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.6.1"
material = "1.10.0"
activity = "1.13.0"
constraintlayout = "2.1.4"
ksp = "2.2.0-2.0.2"
dagger = "2.60.1"
glide = "5.0.5"
lifecycleViewmodelKtx = "2.11.0"
loggingInterceptor = "4.12.0"
navigationFragmentKtx = "2.9.8"
navigationSafeArgsGradlePlugin = "2.9.8"
pagingRuntimeKtx = "3.5.0"
retrofit = "2.9.0"
